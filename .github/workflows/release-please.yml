name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Запускается только после создания реального релиза
  build-android:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild native project
        run: npx expo prebuild --platform android

      - name: Build Android APK (release)
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prebuild native project
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Resolve iOS scheme name
        id: scheme
        run: |
          SCHEME=$(xcodebuild -workspace ios/*.xcworkspace -list 2>/dev/null | sed -n '/Schemes:/,/^$/{ /Schemes:/d; /^$/d; s/^[[:space:]]*//; p; }' | head -1)
          echo "name=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Build iOS Simulator (Release)
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme "${{ steps.scheme.outputs.name }}" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath $RUNNER_TEMP/build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO

      - name: Archive .app for release
        run: |
          APP_DIR=$(find $RUNNER_TEMP/build/Build/Products -name "*.app" -type d | head -1)
          if [ -z "$APP_DIR" ]; then echo "No .app bundle found"; exit 1; fi
          tar -czf $RUNNER_TEMP/VaultFamily-ios-simulator.tar.gz -C "$(dirname "$APP_DIR")" "$(basename "$APP_DIR")"

      - name: Upload iOS build to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ runner.temp }}/VaultFamily-ios-simulator.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
