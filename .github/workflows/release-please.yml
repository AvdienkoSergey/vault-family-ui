name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Запускается только после создания реального релиза
  build-android:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild native project
        run: npx expo prebuild --platform android

      - name: Build Android APK (release)
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prebuild native project
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Resolve iOS scheme name
        id: scheme
        run: |
          echo "=== All available schemes ==="
          xcodebuild -workspace ios/*.xcworkspace -list 2>/dev/null || true
          echo ""
          ALL_SCHEMES=$(xcodebuild -workspace ios/*.xcworkspace -list 2>/dev/null | sed -n '/Schemes:/,/^$/{ /Schemes:/d; /^$/d; s/^[[:space:]]*//; p; }')
          echo "Parsed schemes:"
          echo "$ALL_SCHEMES"
          # Match scheme to workspace name (the app target)
          WS_NAME=$(basename ios/*.xcworkspace .xcworkspace)
          SCHEME=$(echo "$ALL_SCHEMES" | grep -x "$WS_NAME" | head -1)
          if [ -z "$SCHEME" ]; then
            echo "WARNING: No exact match for '$WS_NAME', falling back to workspace name"
            SCHEME="$WS_NAME"
          fi
          echo "Selected scheme: '$SCHEME'"
          echo "name=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Verify scheme builds app target
        run: |
          SCHEME="${{ steps.scheme.outputs.name }}"
          echo "Verifying scheme '$SCHEME' contains app target..."
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme "$SCHEME" \
            -showBuildSettings 2>/dev/null | grep -E "PRODUCT_TYPE|PRODUCT_NAME|FULL_PRODUCT_NAME" | head -10 || true

      - name: Build iOS Simulator (Release)
        run: |
          set -eo pipefail
          SCHEME="${{ steps.scheme.outputs.name }}"
          if [ -z "$SCHEME" ]; then
            echo "ERROR: No scheme resolved. Cannot build."
            exit 1
          fi
          echo "Building scheme: '$SCHEME'"
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath $RUNNER_TEMP/build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tee $RUNNER_TEMP/xcodebuild.log | tail -100
          echo "--- Build exit code: ${PIPESTATUS[0]} ---"

      - name: Show build errors (if any)
        if: failure()
        run: |
          echo "=== ERRORS AND WARNINGS ==="
          grep -E "(error:|fatal error:|BUILD FAILED)" $RUNNER_TEMP/xcodebuild.log | head -50 || true
          echo ""
          echo "=== LAST 200 LINES ==="
          tail -200 $RUNNER_TEMP/xcodebuild.log || true

      - name: Archive .app for release
        run: |
          echo "=== Full Products directory ==="
          find $RUNNER_TEMP/build/Build/Products -maxdepth 3 2>/dev/null || true
          echo ""
          echo "=== Searching for .app bundles ==="
          find $RUNNER_TEMP/build -name "*.app" -type d 2>/dev/null || true
          APP_DIR=$(find $RUNNER_TEMP/build -name "*.app" -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "No .app found."
            echo "=== Full build tree (depth 5) ==="
            find $RUNNER_TEMP/build -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi
          echo "Found: $APP_DIR"
          tar -czf $RUNNER_TEMP/VaultFamily-ios-simulator.tar.gz -C "$(dirname "$APP_DIR")" "$(basename "$APP_DIR")"

      - name: Upload iOS build to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ runner.temp }}/VaultFamily-ios-simulator.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
