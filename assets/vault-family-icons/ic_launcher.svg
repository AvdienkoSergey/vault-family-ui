<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1F2E"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="shackle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <rect width="512" height="512" rx="108" ry="108" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.06"/>

  <!-- Lock shackle (top arch) -->
  <path d="M 186 248 L 186 196 Q 186 148 256 148 Q 326 148 326 196 L 326 248"
        fill="none"
        stroke="url(#shackle)"
        stroke-width="32"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Lock body -->
  <rect x="148" y="240" width="216" height="172" rx="22" ry="22" fill="url(#primary)"/>

  <!-- Keyhole circle -->
  <circle cx="256" cy="316" r="28" fill="#1A1F2E"/>

  <!-- Keyhole slot -->
  <rect x="244" y="334" width="24" height="36" rx="8" ry="8" fill="#1A1F2E"/>

  <!-- Family dots - three small circles above keyhole suggesting people -->
  <circle cx="218" cy="288" r="8" fill="#ECEEF4" opacity="0.25"/>
  <circle cx="256" cy="280" r="8" fill="#ECEEF4" opacity="0.35"/>
  <circle cx="294" cy="288" r="8" fill="#ECEEF4" opacity="0.25"/>

  <!-- Subtle border glow on body -->
  <rect x="148" y="240" width="216" height="172" rx="22" ry="22"
        fill="none" stroke="#818CF8" stroke-width="1.5" opacity="0.4"/>
</svg>
